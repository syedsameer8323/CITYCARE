<!-- ════════════════════════════════════════════════════
     status_update.html  –  Admin: update status + assign staff
     Save this file as:  templates/status_update.html
     ════════════════════════════════════════════════════ -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CityCare – Update Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static',filename='assets/css/bootstrap.min.css')}}">
<link rel="stylesheet" href="{{ url_for('static',filename='assets/css/all.min.css')}}">
<style>
:root{--cc-dark:#0d1f13;--cc-green:#1a4d2e;--cc-mid:#2d6a4f;--cc-accent:#52b788;--cc-light:#d8f3dc;--cc-white:#f8fdf9;--cc-text:#1b2d23;--cc-muted:#5a7a65;--cc-border:#d0e8d8;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:#f0f6f2;color:var(--cc-text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;}
.modal-card{background:#fff;border:1px solid var(--cc-border);border-radius:20px;padding:44px;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,0.1);}
.modal-icon{width:56px;height:56px;background:var(--cc-light);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
.modal-icon i{font-size:24px;color:var(--cc-green);}
h3{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:6px;}
p.sub{color:var(--cc-muted);font-size:14px;margin-bottom:28px;}
.cc-field{margin-bottom:20px;}
.cc-field label{display:block;font-size:12px;font-weight:600;color:var(--cc-muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:7px;}
.cc-field select,.cc-field input{width:100%;border:1.5px solid var(--cc-border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:var(--font-body);color:var(--cc-text);background:var(--cc-white);transition:border-color 0.2s;}
.cc-field select:focus,.cc-field input:focus{outline:none;border-color:var(--cc-accent);box-shadow:0 0 0 3px rgba(82,183,136,0.15);}
.btn-row{display:flex;gap:12px;margin-top:8px;}
.cc-btn-primary{flex:1;background:var(--cc-green);color:#fff;border:none;padding:13px;border-radius:50px;font-family:var(--font-body);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.cc-btn-primary:hover{background:var(--cc-mid);transform:translateY(-1px);box-shadow:0 5px 16px rgba(26,77,46,0.25);}
.cc-btn-back{flex:0 0 auto;background:transparent;color:var(--cc-muted);border:1.5px solid var(--cc-border);padding:12px 20px;border-radius:50px;font-family:var(--font-body);font-size:14px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:flex;align-items:center;gap:7px;}
.cc-btn-back:hover{border-color:var(--cc-green);color:var(--cc-green);}
</style>
</head>
<body>
<div class="modal-card">
  <div class="modal-icon"><i class="fas fa-clipboard-check"></i></div>
  <h3>Update Complaint #{{ id }}</h3>
  <p class="sub">Change the status and optionally assign a staff member to this complaint.</p>

  <form action="/update_status2" method="post">
    <input type="hidden" name="id" value="{{ id }}">

    <div class="cc-field">
      <label>New Status</label>
      <select name="status" required>
        <option value="">Select status</option>
        <option value="pending">Pending</option>
        <option value="verified">Verified</option>
        <option value="processing">Processing</option>
        <option value="resolved">Resolved</option>
      </select>
    </div>

    <div class="cc-field">
      <label>Assign Staff (optional)</label>
      <select name="staff_id" onchange="updateStaffName(this)">
        <option value="">— Keep current / Unassigned —</option>
        {% for s in staff_list %}
        <option value="{{ s[0] }}" data-name="{{ s[1] }}">{{ s[1] }} ({{ s[3] }} active tasks)</option>
        {% endfor %}
      </select>
      <input type="hidden" name="staff_name" id="staff_name_hidden">
    </div>

    <div class="btn-row">
      <a href="/view_complaints" class="cc-btn-back"><i class="fas fa-arrow-left"></i> Back</a>
      <button class="cc-btn-primary" type="submit"><i class="fas fa-save"></i> Save Changes</button>
    </div>
  </form>
</div>

<script>
function updateStaffName(sel) {
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('staff_name_hidden').value = opt.dataset.name || '';
}
</script>
</body>
</html>
